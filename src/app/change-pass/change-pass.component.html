<div class="login-backdrop" (click)="onExit()">
  <div class="login-modal" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="onExit()">
      <span class="close-icon">&times;</span>
    </button>

    <div class="modal-header">
      <div class="logo-container">
        <img
          src="assets/img/logoFila.png"
          alt="Filadelfia"
          class="sidebar-logo"
        />
      </div>
      <h2>Cambiar Contraseña</h2>
    </div>

    <form class="login-form">
      <!-- Campo Usuario (Editable) -->
      <div class="form-group">
        <label for="username">
          <span class="input-icon">👤</span>
          Usuario
        </label>
        <div class="input-container">
          <input
            id="username"
            name="username"
            type="text"
            placeholder="Ingresa tu usuario"
            [(ngModel)]="customer.name"
            (ngModelChange)="onUserNameChange()"
          />
          <div class="user-status-indicator">
            <span *ngIf="userCheckInProgress" class="status-checking">⏳ Verificando...</span>
            <span *ngIf="!userCheckInProgress && userExists" class="status-exists">✅ Usuario encontrado</span>
            <span *ngIf="!userCheckInProgress && !userExists && customer.name" class="status-not-exists">❌ Usuario no existe</span>
          </div>
        </div>
      </div>

      <!-- Campo Contraseña Actual -->
      <div class="form-group">
        <label for="currentPassword">
          <span class="input-icon">🔒</span>
          Contraseña Actual
          <span class="optional-text">(Si no tienes, déjalo vacío)</span>
        </label>
        <div class="password-input-container">
          <input
            id="currentPassword"
            name="currentPassword"
            [type]="showPassword ? 'text' : 'password'"
            autocomplete="current-password"
            placeholder="Ingresa tu contraseña actual"
            [(ngModel)]="customer.currentPassword"
          />
          <button
            type="button"
            class="password-toggle-btn"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="
              showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'
            "
          >
            <span *ngIf="!showPassword">👁️</span>
            <span *ngIf="showPassword">🙈</span>
          </button>
        </div>
      </div>

      <!-- Campo Nueva Contraseña -->
      <div class="form-group">
        <label for="newPassword">
          <span class="input-icon">🔒</span>
          Nueva Contraseña
        </label>
        <div class="password-input-container">
          <input
            id="newPassword"
            name="newPassword"
            [type]="showNewPassword ? 'text' : 'password'"
            autocomplete="new-password"
            placeholder="Ingresa tu nueva contraseña"
            [(ngModel)]="customer.newPassword"
          />
          <button
            type="button"
            class="password-toggle-btn"
            (click)="toggleNewPasswordVisibility()"
            [attr.aria-label]="
              showNewPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'
            "
          >
            <span *ngIf="!showNewPassword">👁️</span>
            <span *ngIf="showNewPassword">🙈</span>
          </button>
        </div>
      </div>

      <!-- Campo Confirmar Contraseña -->
      <div class="form-group">
        <label for="confirmPassword">
          <span class="input-icon">🔒</span>
          Confirma Nueva Contraseña
        </label>
        <div class="password-input-container">
          <input
            id="confirmPassword"
            name="confirmPassword"
            [type]="showConfirmPassword ? 'text' : 'password'"
            autocomplete="new-password"
            placeholder="Confirma tu nueva contraseña"
            [(ngModel)]="customer.confirmPassword"
          />
          <button
            type="button"
            class="password-toggle-btn"
            (click)="toggleConfirmPasswordVisibility()"
            [attr.aria-label]="
              showConfirmPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'
            "
          >
            <span *ngIf="!showConfirmPassword">👁️</span>
            <span *ngIf="showConfirmPassword">🙈</span>
          </button>
        </div>
      </div>
    </form>

    <!-- Acciones -->
    <div class="form-actions">
      <button
        type="button"
        class="login-btn"
        (click)="CambiarPass()"
        [disabled]="isLoading"
      >
        <span *ngIf="!isLoading">Cambiar Contraseña</span>
        <span *ngIf="isLoading">Procesando...</span>
      </button>
      <button type="button" class="exit-btn" (click)="onExit()" [disabled]="isLoading">
        Cancelar
      </button>
    </div>
  </div>
</div>
