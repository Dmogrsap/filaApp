<dx-tab-panel
  width="100%"
  [dataSource]="dataSourceMenusTab"
  [selectedIndex]="0"
  [loop]="false"
  [animationEnabled]="true"
  [swipeEnabled]="true"
  [scrollingEnabled]="true"
>
  <dxo-scrolling mode="virtual"></dxo-scrolling>

  <div *dxTemplate="let titulo of 'title'">
    <span id="titles">{{ titulo.Nombre }}</span>
  </div>
  <div *dxTemplate="let items of 'item'">
    <div class="tabpanel-item">
      <div *ngIf="items.Nombre == 'Fila Store'" class="container-fluid">
        <br />
      </div>

      <div *ngIf="items.Nombre == 'Fila Coffee'" class="container-fluid">
        <div class="dashboard-container" style="padding: 20px">
          <h2>Dashboard de Pedidos de Café (Tiempo Real)</h2>

          <dx-data-grid
            [dataSource]="pedidos"
            keyExpr="id"
            [showBorders]="true"
            [rowAlternationEnabled]="true"
            (onRowUpdating)="onRowUpdating($event)"
            (onRowRemoving)="onRowRemoving($event)"
            
          >
            <dxo-editing
              mode="cell"
              [allowUpdating]="true"
              [allowDeleting]="true"
              [useIcons]="true"
            >
            </dxo-editing>

            <dxo-filter-row [visible]="true"></dxo-filter-row>
            <dxo-header-filter [visible]="true"></dxo-header-filter>

            <dxi-column
              dataField="cliente"
              caption="Cliente"
              [allowEditing]="false"
            ></dxi-column>
            <dxi-column
              dataField="producto"
              caption="Café / Producto"
              [allowEditing]="false"
            ></dxi-column>
            <dxi-column
              dataField="cantidad"
              caption="Cant."
              [allowEditing]="false"
              alignment="center"
            ></dxi-column>

            <dxi-column
              dataField="estado"
              caption="Estado del Pedido"
              alignment="center"
              filterValue="pendiente"
              [allowHeaderFiltering]="true"
              [filterOperations]="['=', '<>']"
            >
              <dxo-lookup [dataSource]="['pendiente', 'entregado']">
              </dxo-lookup>
              <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>
            </dxi-column>

            <dxi-column
              dataField="fecha"
              caption="Fecha"
              dataType="datetime"
              [allowEditing]="false"
              format="HH:mm dd/MM/yyyy"
              sortOrder="asc"
              [allowHeaderFiltering]="false"
              [allowFiltering]="false"
            ></dxi-column>
            <dxi-column type="buttons" width="120">
              <dxi-button name="edit"></dxi-button>
              <dxi-button name="delete"></dxi-button>
            </dxi-column>
          </dx-data-grid>
        </div>
      </div>
    </div>
  </div>
</dx-tab-panel>
